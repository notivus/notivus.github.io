
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Inmate Directory</title>
<style>
body {
    background: #0d1117;
    color: #e6edf3;
    font-family: Arial, sans-serif;
}
header {
    padding: 18px;
    background: #161b22;
    font-size: 26px;
    text-align: center;
    border-bottom: 1px solid #30363d;
}
#controls {
    display: flex;
    gap: 12px;
    padding: 16px;
    background: #161b22;
}
select, input {
    padding: 8px;
    background: #0d1117;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 6px;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    border-bottom: 1px solid #30363d;
}
th {
    background: #161b22;
    position: sticky;
    top: 0;
}
tr:hover {
    background: #1c212b;
}
.doc-link {
    color: #4da6ff;
    text-decoration: none;
}
.doc-link:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<header>Inmate Directory</header>

<div id="controls">
    <input id="searchBox" placeholder="Search name...">
    <select id="locFilter">
        <option value="">All Locations</option>
    </select>
</div>

<table>
<thead>
<tr>
    <th>DOC Number</th>
    <th>Name</th>
    <th>Age</th>
    <th>Location</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<script>
let data = [];
const rowsEl = document.getElementById("rows");
const searchBox = document.getElementById("searchBox");
const locFilter = document.getElementById("locFilter");

// Load JSON asynchronously
fetch("inmates.json")
    .then(res => res.json())
    .then(json => {
        data = json;

        // populate location dropdown
        const locations = Array.from(new Set(data.map(r => r.Location))).sort();
        locations.forEach(loc => {
            const opt = document.createElement("option");
            opt.value = loc;
            opt.textContent = loc;
            locFilter.appendChild(opt);
        });

        render();
    });

function render() {
    const q = searchBox.value.toLowerCase();
    const loc = locFilter.value;

    const filtered = data.filter(r =>
        r.Name.toLowerCase().includes(q) &&
        (loc === "" || r.Location === loc)
    );

    rowsEl.innerHTML = "";
    filtered.forEach(r => {
        const link = `https://vinelink.vineapps.com/offender-detail/48626/900/${r.DOCNumber}`;
        rowsEl.innerHTML += `
        <tr>
            <td><a class="doc-link" target="_blank" href="${link}">${r.DOCNumber}</a></td>
            <td>${r.Name}</td>
            <td>${r.Age}</td>
            <td>${r.Location}</td>
        </tr>`;
    });
}

searchBox.addEventListener("input", render);
locFilter.addEventListener("change", render);
</script>

</body>
</html>
